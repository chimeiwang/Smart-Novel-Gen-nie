name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+asyncpg://inkforge:ci-placeholder@localhost:5432/inkforge
      JWT_SECRET: ci-placeholder-ci-placeholder-ci-placeholder
      MODEL_PROVIDER: fake
      OPENAI_API_KEY: ""
      OPENAI_BASE_URL: https://api.deepseek.com/v1
      OPENAI_MODEL: deepseek-v4-flash
      LANGSMITH_TRACING_ENABLED: "false"
      WORKFLOW_EVENT_LOG_ENABLED: "false"
      WORKFLOW_EVENT_DEBUG_ENABLED: "false"
      LANGGRAPH_STUDIO_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: uv sync --frozen --all-packages --group dev

      - name: Check generated API client
        run: npm run api:check

      - name: Test Web and API client
        run: npm run test:web

      - name: Test Python workspace
        shell: bash
        run: |
          set +e
          uv run pytest -q 2>&1 | tee pytest.log
          test_status=${PIPESTATUS[0]}
          if [ "$test_status" -ne 0 ]; then
            {
              echo "## Python 测试失败"
              echo '```text'
              tail -n 200 pytest.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            annotation="$(tail -n 80 pytest.log)"
            annotation="${annotation//'%'/'%25'}"
            annotation="${annotation//$'\n'/'%0A'}"
            annotation="${annotation//$'\r'/'%0D'}"
            echo "::error title=Python 测试失败::$annotation"
          fi
          exit "$test_status"

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy apps/core-api/src apps/agent-service/src packages/service-contracts/src packages/service-auth/src

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    env:
      INKFORGE_IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Docker images
        run: docker compose --env-file .env.example -f infra/compose.yaml build web core-api agent-service

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Upload Docker images
        run: |
          docker save \
            "inkforge-web:${INKFORGE_IMAGE_TAG}" \
            "inkforge-core-api:${INKFORGE_IMAGE_TAG}" \
            "inkforge-agent-service:${INKFORGE_IMAGE_TAG}" | gzip | ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            -i ~/.ssh/deploy_key \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "gunzip | docker load"

      - name: Deploy over SSH
        shell: bash
        run: |
          set +e
          ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            -i ~/.ssh/deploy_key \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "APP_DIR='${{ vars.APP_DIR }}' REPO_URL='https://github.com/chimeiwang/Smart-Novel-Gen-nie.git' BRANCH='main' DEPLOY_SHA='${{ github.sha }}' INKFORGE_IMAGE_TAG='${INKFORGE_IMAGE_TAG}' sh -s" \
            < scripts/deploy-production.sh 2>&1 | tee deploy.log
          deploy_status=${PIPESTATUS[0]}
          if [ "$deploy_status" -ne 0 ]; then
            {
              echo "## 生产部署失败"
              echo '```text'
              tail -n 200 deploy.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            annotation="$(tail -n 80 deploy.log)"
            annotation="${annotation//'%'/'%25'}"
            annotation="${annotation//$'\n'/'%0A'}"
            annotation="${annotation//$'\r'/'%0D'}"
            echo "::error title=生产部署失败::$annotation"
          fi
          exit "$deploy_status"
