name: inkforge

services:
  nginx:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    user: "101:101"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "${INKFORGE_PORT:-80}:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    tmpfs:
      - /tmp:size=8m,mode=1777
      - /var/cache/nginx:size=16m,uid=101,gid=101
    networks:
      - public_net
    depends_on:
      web:
        condition: service_healthy
      core-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/nginx-health"]
      interval: 15s
      timeout: 3s
      retries: 5
    cpus: "0.10"
    mem_limit: 64m

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
    image: inkforge-web:${INKFORGE_IMAGE_TAG:-latest}
    user: "10001:10001"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      CORE_API_INTERNAL_URL: http://core-api:8000
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: "43119"
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /app/apps/web/.next/cache:size=64m,uid=10001,gid=10001
    networks:
      - public_net
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:43119/login').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    cpus: "0.35"
    mem_limit: 320m

  core-api:
    build:
      context: ..
      dockerfile: infra/docker/core-api.Dockerfile
    image: inkforge-core-api:${INKFORGE_IMAGE_TAG:-latest}
    user: "10001:10001"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL:?必须配置现有 PostgreSQL 数据库地址}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?必须配置会话签名密钥}
      TRUSTED_PROXY_CIDRS: 172.28.0.0/24
      AGENT_SERVICE_CIDRS: 172.29.0.0/24
      CORE_SERVICE_PRIVATE_KEY_PATH: /run/inkforge-keys/core-to-agent-private.pem
      CORE_SERVICE_KEY_ID: ${CORE_SERVICE_KEY_ID:-core-api-v1}
      AGENT_SERVICE_PUBLIC_KEY_PATH: /run/inkforge-keys/agent-to-core-jwks.json
      AGENT_SERVICE_URL: http://agent-service:8001
      UPLOADS_ROOT: /data/uploads
      WORKFLOW_EVENT_DEBUG_ENABLED: ${WORKFLOW_EVENT_DEBUG_ENABLED:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/data/uploads
      - ${SERVICE_KEYS_DIR:-./secrets}/core-to-agent-private.pem:/run/inkforge-keys/core-to-agent-private.pem:ro
      - ${SERVICE_KEYS_DIR:-./secrets}/agent-to-core-jwks.json:/run/inkforge-keys/agent-to-core-jwks.json:ro
    tmpfs:
      - /tmp:size=32m,mode=1777
    networks:
      - public_net
      - agent_net
      - data_net
    depends_on:
      redis:
        condition: service_healthy
      agent-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
    cpus: "0.45"
    mem_limit: 448m

  agent-service:
    build:
      context: ..
      dockerfile: infra/docker/agent-service.Dockerfile
    image: inkforge-agent-service:${INKFORGE_IMAGE_TAG:-latest}
    user: "10001:10001"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      ENVIRONMENT: production
      MODEL_PROVIDER: ${MODEL_PROVIDER:-openai_compatible}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-flash}
      REDIS_URL: redis://redis:6379/0
      TRUSTED_CORE_CIDRS: 172.29.0.0/24
      CORE_SERVICE_PUBLIC_KEY_PATH: /run/inkforge-keys/core-to-agent-jwks.json
      AGENT_SERVICE_PRIVATE_KEY_PATH: /run/inkforge-keys/agent-to-core-private.pem
      AGENT_SERVICE_KEY_ID: ${AGENT_SERVICE_KEY_ID:-agent-service-v1}
      CORE_API_URL: http://core-api:8000
      WORKFLOW_HUMAN_LOG_DIR: /data/agent-logs
      RAG_EMBEDDING_API_KEY: ${RAG_EMBEDDING_API_KEY:-}
      RAG_EMBEDDING_BASE_URL: ${RAG_EMBEDDING_BASE_URL:-}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-}
    volumes:
      - agent_logs:/data/agent-logs
      - ${SERVICE_KEYS_DIR:-./secrets}/core-to-agent-jwks.json:/run/inkforge-keys/core-to-agent-jwks.json:ro
      - ${SERVICE_KEYS_DIR:-./secrets}/agent-to-core-private.pem:/run/inkforge-keys/agent-to-core-private.pem:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
    networks:
      - agent_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/internal/v1/health/ready', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
    cpus: "0.65"
    mem_limit: 640m

  redis:
    image: redis:7.4-alpine
    user: "999:999"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    tmpfs:
      - /data:size=16m,uid=999,gid=999
      - /tmp:size=8m,mode=1777
    networks:
      - agent_net
      - data_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    cpus: "0.10"
    mem_limit: 96m

networks:
  public_net:
    ipam:
      config:
        - subnet: 172.28.0.0/24
  agent_net:
    internal: true
    ipam:
      config:
        - subnet: 172.29.0.0/24
  data_net:
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  uploads:
  agent_logs:
