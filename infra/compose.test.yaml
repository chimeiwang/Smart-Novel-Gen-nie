services:
  core-api:
    environment:
      DATABASE_URL: ${TEST_DATABASE_URL:?必须配置测试数据库地址}
      JWT_SECRET: ${TEST_JWT_SECRET:-test-only-session-secret-at-least-32-bytes}
    depends_on:
      postgres:
        condition: service_healthy
  agent-service:
    environment:
      MODEL_PROVIDER: fake
      OPENAI_API_KEY: ""
  postgres:
    image: pgvector/pgvector:pg16
    user: "999:999"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${TEST_POSTGRES_USER:?必须配置测试数据库用户}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:?必须配置测试数据库密码}
      POSTGRES_DB: ${TEST_POSTGRES_DB:?必须配置测试数据库名}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/run/postgresql:size=8m,uid=999,gid=999
    networks:
      - data_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    cpus: "0.35"
    mem_limit: 384m

volumes:
  postgres_test_data:
    external: true
    name: ${TEST_POSTGRES_DATA_VOLUME:?必须配置已有测试数据库卷名称}
