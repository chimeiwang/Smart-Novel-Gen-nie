[build-system]
requires = ["hatchling>=1.27,<2"]
build-backend = "hatchling.build"

[project]
name = "inkforge-service-auth"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
    "cryptography>=44,<47",
    "inkforge-service-contracts",
    "orjson>=3.10,<4",
    "PyJWT[crypto]>=2.10,<3",
]

[tool.uv.sources]
inkforge-service-contracts = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/inkforge_service_auth"]
